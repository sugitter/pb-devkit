name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust: Test + Lint (Linux) ──
  test-core:
    name: Test & Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pb-devkit-2.x/target
          key: cargo-${{ runner.os }}-${{ hashFiles('pb-devkit-2.x/pb-devkit-core/Cargo.toml', 'pb-devkit-2.x/pb-devkit-cli/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # Test core library (now 14 tests including PE + PBL)
      - name: Test core
        working-directory: pb-devkit-2.x/pb-devkit-core
        run: cargo test --all-features

      # Test CLI
      - name: Test CLI
        working-directory: pb-devkit-2.x/pb-devkit-cli
        run: cargo test --all-features

      # Check formatting
      - name: Check fmt
        working-directory: pb-devkit-2.x/pb-devkit-core
        run: cargo fmt --check

      - name: Check fmt (CLI)
        working-directory: pb-devkit-2.x/pb-devkit-cli
        run: cargo fmt --check

      # Clippy
      - name: Clippy (core)
        working-directory: pb-devkit-2.x/pb-devkit-core
        run: cargo clippy -- -D warnings

      - name: Clippy (CLI)
        working-directory: pb-devkit-2.x/pb-devkit-cli
        run: cargo clippy -- -D warnings

  # ── Rust: Build CLI (Windows) ──
  build-cli-windows:
    name: Build CLI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pb-devkit-2.x/target
          key: cargo-windows-${{ hashFiles('pb-devkit-2.x/pb-devkit-core/Cargo.toml', 'pb-devkit-2.x/pb-devkit-cli/Cargo.toml') }}
          restore-keys: cargo-windows-

      - name: Build CLI (release)
        working-directory: pb-devkit-2.x/pb-devkit-cli
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbdevkit-windows
          path: pb-devkit-2.x/target/release/pbdevkit.exe

  # ── Angular: Build Frontend ──
  build-frontend:
    name: Build Desktop Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pb-devkit-2.x/pb-devkit-desktop/package-lock.json

      - name: Install dependencies
        working-directory: pb-devkit-2.x/pb-devkit-desktop
        run: npm ci

      - name: Build Angular
        working-directory: pb-devkit-2.x/pb-devkit-desktop
        run: npx ng build --configuration production

  # ── Security: cargo-audit ──
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit core
        working-directory: pb-devkit-2.x/pb-devkit-core
        run: cargo audit

      - name: Audit CLI
        working-directory: pb-devkit-2.x/pb-devkit-cli
        run: cargo audit
